# Documentation Quality Checker Configuration
#
# Purpose: Configure whitelist and ignore patterns for check-docs-quality.py
#
# Philosophy:
#   - Whitelist is for exceptions, not the rule
#   - Keep whitelist minimal to encourage good documentation habits
#   - Document why each whitelist entry exists
#
# Scope:
#   This configuration is for AUTOMATED checks only.
#   Style guidelines (Simple English, etc.) are documented but not enforced by tools.

# =============================================================================
# AUTOMATED RULES (Enforced by check-docs-quality.py)
# =============================================================================

# File length whitelist
# Files that can exceed MAX_LINES (256)
line_whitelist:
  - CHANGELOG.md
  - CHANGELOG
  - HISTORY.md
  - INSTALLATION.md
  - OUTPUT-FORMAT.md
  - GETTING_STARTED.md
# Reason: Changelogs are inherently long lists
# INSTALLATION.md: Comprehensive installation guide with multiple methods and platforms
# OUTPUT-FORMAT.md: Detailed output specification with many examples
# GETTING_STARTED.md: Complete contributor onboarding with setup steps

# Path patterns to ignore (not documentation)
# Note: Use raw regex patterns (backslash is literal in YAML single quotes)
ignore_patterns:
  - \.git/
  - \.venv/
  - node_modules/
  - __pycache__/
  - \.pyc$
  - test_corpus/
# Reason: Generated files, dependencies, test fixtures

# =============================================================================
# STYLE GUIDELINES (Manual review, not automated)
# =============================================================================
#
# The following are writing guidelines for contributors, NOT automated checks:
#
# - Write in Simple English (sentences < 25 words, active voice, no idioms)
# - Use imperative mood in instructions
# - One concept per section
# - Explain "why" not just "what"
#
# These are enforced through code review, not automated tools.
# Rationale: NLP-based style checking requires heavy dependencies and has
# high false positive rates. Human review is more effective for style.
#
# =============================================================================
