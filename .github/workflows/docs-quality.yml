name: Documentation Quality

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/check-docs-quality.py'
      - '.docs-quality-config.yaml'
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/check-docs-quality.py'
      - '.docs-quality-config.yaml'

jobs:
  check-docs-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run documentation quality checker
        run: |
          python scripts/check-docs-quality.py .

      - name: Show quality report
        if: failure()
        run: |
          echo "::warning::Documentation quality issues found. Please fix before merging."
          echo "See scripts/check-docs-quality.py for rules."
          echo "Configuration: .docs-quality-config.yaml"
