# CI/CD Pipeline for traceflux
#
# Philosophy: Simple, Practical, Elegant
# - Single Python version (cost control)
# - GitHub Releases only (no PyPI)
# - Minimal jobs (test + lint + release)
#
# Triggers:
# - PR to main: test + lint
# - Push to main: test + lint
# - Tag v*: test + lint + GitHub Release

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -e ".[dev]"

      - run: pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install black flake8 isort

      - run: black --check src/ tests/
      - run: isort --check-only src/ tests/
      - run: flake8 --max-line-length=100 --ignore=E501,W503,F401,F841 src/ tests/

  release:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
