# .github/workflows/release.yml
#
# Publishes new releases automatically
# Uses semantic-release to calculate version from commit messages
#
# Triggers:
# - Push to main (after validation passes)
#
# Behavior:
# - If commits follow Conventional Commits: creates new release
# - If no release-worthy commits: skips silently
#

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.12'

      - name: Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com
          build: false

      - name: Build Package with PDM
        if: steps.release.outputs.released == 'true'
        run: pdm build

      - name: Upload Distribution Artifacts
        uses: actions/upload-artifact@v4
        if: steps.release.outputs.released == 'true'
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
