# .github/workflows/cd.yml
#
# Continuous Delivery with python-semantic-release
# Triggers on push to main
# Auto-calculates version, creates tag, publishes GitHub Release
#

name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset branch to workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.12'

      - run: pdm install --dev

      - run: pdm run pytest -v

      - run: pdm run black --check src/ tests/
      - run: pdm run isort --check-only src/ tests/
      - run: pdm run flake8 --max-line-length=100 --ignore=E501,W503,F401,F841 src/ tests/

      - name: Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com
          build: false

      - name: Build Package with PDM
        if: steps.release.outputs.released == 'true'
        run: pdm build

      - name: Upload Distribution Artifacts
        uses: actions/upload-artifact@v4
        if: steps.release.outputs.released == 'true'
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: python-semantic-release/publish-action@v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
